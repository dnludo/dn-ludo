<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DN Ludo Game</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f1ea;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
text-align:center;
}

h1{
color:#07153d;
margin-bottom:20px;
}

.player{
padding:15px;
margin:10px 0;
border-radius:12px;
background:#f0f0f0;
font-size:20px;
font-weight:bold;
}

.active{
background:#07153d;
color:white;
}

.dice{
font-size:90px;
margin:25px 0;
}

.roll-btn{
background:#07153d;
color:white;
border:none;
padding:15px 30px;
border-radius:12px;
font-size:18px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:bold;
color:#07153d;
}
</style>

</head>
<body>

<div class="container">

<h1>🎲 DN Ludo</h1>

<div id="player1" class="player"></div>
<div id="player2" class="player"></div>

<div id="dice" class="dice">🎲</div>

<button class="roll-btn" onclick="rollDice()">
Roll Dice
</button>

<div id="result" class="result"></div>

</div>

<script>

const players =
JSON.parse(localStorage.getItem("dnPlayers")) ||
["Player 1","Player 2"];

let currentTurn = 0;

document.getElementById("player1").innerText = players[0];
document.getElementById("player2").innerText = players[1];

function updateTurn(){

document.getElementById("player1").classList.remove("active");
document.getElementById("player2").classList.remove("active");

if(currentTurn === 0){
document.getElementById("player1").classList.add("active");
}else{
document.getElementById("player2").classList.add("active");
}

}

function rollDice(){

let value = Math.floor(Math.random()*6)+1;

const faces = {
1:"⚀",
2:"⚁",
3:"⚂",
4:"⚃",
5:"⚄",
6:"⚅"
};

document.getElementById("dice").innerText =
faces[value];

document.getElementById("result").innerText =
players[currentTurn] + " rolled " + value;

currentTurn++;

if(currentTurn > 1){
currentTurn = 0;
}

updateTurn();

}

updateTurn();

</script>

</body>
</html>
