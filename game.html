<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DN Ludo - 2 Players</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f1ea;
margin:0;
padding:15px;
text-align:center;
}

h1{
color:#07153d;
}

.board{
width:360px;
margin:20px auto;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
}

.cell{
height:60px;
background:white;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
box-shadow:0 1px 4px rgba(0,0,0,.15);
}

.red{
background:#ff5252;
color:white;
}

.green{
background:#43d66f;
color:white;
}

.token{
font-size:26px;
}

.info{
max-width:360px;
margin:auto;
background:white;
padding:15px;
border-radius:15px;
}

button{
background:#07153d;
color:white;
border:none;
padding:14px 25px;
border-radius:12px;
font-size:18px;
margin-top:15px;
}

#turn{
font-size:20px;
font-weight:bold;
margin:10px 0;
}

#dice{
font-size:70px;
margin:10px 0;
}
</style>
</head>
<body>

<h1>🎲 DN Ludo</h1>
<div id="turn"></div>
<div class="board" id="board"></div>
<div class="info">
<div id="dice">🎲</div>
<button onclick="rollDice()">Roll Dice</button>
<h3 id="msg"></h3>
</div>

<script>

const players =
JSON.parse(localStorage.getItem("dnPlayers")) ||
["Red","Green"];

const pathLength = 25;

let redPos = -1;
let greenPos = -1;

let turn = 0;

const board = document.getElementById("board");

function drawBoard(){

board.innerHTML="";

for(let i=0;i<pathLength;i++){

let cell=document.createElement("div");
cell.className="cell";

if(i===redPos && i===greenPos){
cell.innerHTML="🔴🟢";
}
else if(i===redPos){
cell.innerHTML="🔴";
}
else if(i===greenPos){
cell.innerHTML="🟢";
}

board.appendChild(cell);
}

document.getElementById("turn").innerText =
turn===0 ?
players[0]+"'s Turn 🔴" :
players[1]+"'s Turn 🟢";

}

function rollDice(){

let dice=Math.floor(Math.random()*6)+1;

const faces={
1:"⚀",
2:"⚁",
3:"⚂",
4:"⚃",
5:"⚄",
6:"⚅"
};

document.getElementById("dice").innerText=
faces[dice];

if(turn===0){

if(redPos===-1){
if(dice===6) redPos=0;
}else{
redPos+=dice;
}

if(redPos>=24){
alert(players[0]+" Wins! 🏆");
redPos=-1;
greenPos=-1;
}

turn=1;

}else{

if(greenPos===-1){
if(dice===6) greenPos=0;
}else{
greenPos+=dice;
}

if(greenPos>=24){
alert(players[1]+" Wins! 🏆");
redPos=-1;
greenPos=-1;
}

turn=0;
}

drawBoard();

}

drawBoard();

</script>

</body>
</html>
