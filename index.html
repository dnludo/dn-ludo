<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DN Ludo</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
text-align:center;
}

h1{
color:#08153c;
margin-bottom:20px;
}

.board{
width:350px;
height:350px;
margin:20px auto;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(3,1fr);
gap:5px;
}

.box{
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
font-weight:bold;
color:white;
}

.red{background:#e53935;}
.green{background:#43a047;}
.yellow{background:#fbc02d;color:black;}
.blue{background:#1e88e5;}

.center{
background:white;
border:3px solid #08153c;
color:#08153c;
}

.card{
background:white;
padding:20px;
border-radius:15px;
max-width:400px;
margin:auto;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.turn{
font-size:20px;
font-weight:bold;
margin:15px 0;
}

.dice{
font-size:70px;
margin:20px 0;
}

button{
background:#08153c;
color:white;
border:none;
padding:15px 30px;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

.players{
margin-top:20px;
text-align:left;
}

.player{
padding:10px;
margin:5px 0;
background:#f0f0f0;
border-radius:8px;
}
</style>
</head>
<body>

<h1>🎲 DN Ludo</h1>

<div class="board">
<div class="box red">R</div>
<div class="box"></div>
<div class="box green">G</div>

<div class="box"></div>
<div class="box center">DN</div>
<div class="box"></div>

<div class="box yellow">Y</div>
<div class="box"></div>
<div class="box blue">B</div>
</div>

<div class="card">

<div class="turn" id="turn">
Player Turn
</div>

<div class="dice" id="dice">
🎲
</div>

<button onclick="rollDice()">
Roll Dice
</button>

<div class="players" id="players">
</div>

</div>

<script>

const players =
JSON.parse(localStorage.getItem("dnPlayers")) ||
["Player 1","Player 2","Player 3","Player 4"];

let currentPlayer=0;

let scores=new Array(players.length).fill(0);

function renderPlayers(){

let html="";

players.forEach((player,index)=>{

html += `
<div class="player">
<b>${player}</b> : ${scores[index]} Steps
</div>
`;

});

document.getElementById("players").innerHTML=html;

document.getElementById("turn").innerText=
players[currentPlayer] + "'s Turn";

}

function rollDice(){

let value=Math.floor(Math.random()*6)+1;

const diceFaces={
1:"⚀",
2:"⚁",
3:"⚂",
4:"⚃",
5:"⚄",
6:"⚅"
};

document.getElementById("dice").innerText=
diceFaces[value];

scores[currentPlayer]+=value;

if(scores[currentPlayer]>=50){

alert(players[currentPlayer] + " Wins! 🏆");

scores=new Array(players.length).fill(0);

currentPlayer=0;

renderPlayers();

return;
}

currentPlayer++;

if(currentPlayer>=players.length){
currentPlayer=0;
}

renderPlayers();
}

renderPlayers();

</script>

</body>
</html>
