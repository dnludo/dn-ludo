<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DN Ludo</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#020024,#090979,#000000);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

.container{
padding:20px;
}

.logo{
width:280px;
max-width:90%;
border-radius:20px;
box-shadow:0 0 25px rgba(255,215,0,0.6);
}

h1{
margin-top:20px;
font-size:42px;
color:gold;
text-shadow:0 0 20px gold;
}

p{
margin-top:10px;
font-size:18px;
opacity:0.9;
}

.play-btn{
margin-top:30px;
padding:15px 40px;
font-size:22px;
font-weight:bold;
background:gold;
color:black;
border:none;
border-radius:50px;
cursor:pointer;
box-shadow:0 0 20px gold;
}

.play-btn:hover{
transform:scale(1.05);
}
</style>
</head>

<body>

<div class="container">

<img src="5161ABE9-C9C9-4D42-BCF3-0B604EBE4393.png" class="logo">

<h1>DN LUDO</h1>

<p>Presented by HK Games & Co.</p>

<button class="play-btn">
🎲 PLAY NOW
</button>

</div>

</body>
</html>
