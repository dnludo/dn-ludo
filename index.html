<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DN Ludo</title>

<style>
body{
margin:0;
background:#f5f5f5;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#fff;
width:350px;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#08153c;
}

p{
text-align:center;
color:#666;
}

.players{
display:flex;
gap:10px;
margin:20px 0;
}

.players button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#eee;
font-size:18px;
}

.active{
background:#08153c !important;
color:white;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:10px;
box-sizing:border-box;
}

.start{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#08153c;
color:white;
font-size:18px;
}
</style>
</head>

<body>

<div class="card">
<h1>DN Ludo</h1>
<p>Classic pass-and-play board game</p>

<div class="players">
<button>2</button>
<button>3</button>
<button class="active">4</button>
</div>

<input placeholder="Player 1">
<input placeholder="Player 2">
<input placeholder="Player 3">
<input placeholder="Player 4">

<button class="start">Start Game</button>
</div>

</body>
</html>
