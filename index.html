<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DN Ludo</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f1ea;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
background:#fff;
width:100%;
max-width:500px;
padding:35px 25px;
border-radius:28px;
box-shadow:0 10px 35px rgba(0,0,0,.08);
}

.logo-dots{
display:flex;
justify-content:center;
gap:8px;
margin-bottom:15px;
}

.dot{
width:14px;
height:14px;
border-radius:50%;
}

.red{background:#ff4d4d;}
.green{background:#3fd46b;}
.yellow{background:#ffc83d;}
.blue{background:#4b8dff;}

h1{
text-align:center;
font-size:48px;
font-weight:800;
color:#07153d;
margin-bottom:10px;
}

.desc{
text-align:center;
color:#777;
line-height:1.5;
margin-bottom:30px;
}

.label{
font-size:13px;
font-weight:700;
letter-spacing:2px;
color:#666;
margin-bottom:12px;
text-transform:uppercase;
}

.players{
display:flex;
gap:12px;
margin-bottom:25px;
}

.players button{
flex:1;
height:60px;
border-radius:14px;
border:1px solid #ddd;
background:#fff;
font-size:24px;
cursor:pointer;
}

.players button.active{
background:#07153d;
color:#fff;
border:none;
}

.player-row{
display:flex;
align-items:center;
gap:12px;
margin-bottom:12px;
}

.player-dot{
width:34px;
height:34px;
border-radius:50%;
box-shadow:0 2px 8px rgba(0,0,0,.2);
flex-shrink:0;
}

input{
flex:1;
height:48px;
border:1px solid #ddd;
border-radius:12px;
padding:0 15px;
font-size:16px;
}

.start-btn{
width:100%;
height:60px;
margin-top:20px;
background:#07153d;
color:white;
border:none;
border-radius:14px;
font-size:22px;
font-weight:600;
cursor:pointer;
}
</style>
</head>
<body>

<div class="card">

<div class="logo-dots">
<div class="dot red"></div>
<div class="dot green"></div>
<div class="dot yellow"></div>
<div class="dot blue"></div>
</div>

<h1>DN Ludo</h1>

<p class="desc">
Classic pass-and-play board game.
Roll, race, and reach home first.
</p>

<div class="label">Number of Players</div>

<div class="players">
<button onclick="setPlayers(2,this)">2</button>
<button onclick="setPlayers(3,this)">3</button>
<button class="active" onclick="setPlayers(4,this)">4</button>
</div>

<div class="label">Player Names</div>

<div class="player-row">
<div class="player-dot red"></div>
<input id="p1" placeholder="Player 1">
</div>

<div class="player-row">
<div class="player-dot green"></div>
<input id="p2" placeholder="Player 2">
</div>

<div class="player-row" id="row3">
<div class="player-dot yellow"></div>
<input id="p3" placeholder="Player 3">
</div>

<div class="player-row" id="row4">
<div class="player-dot blue"></div>
<input id="p4" placeholder="Player 4">
</div>

<button class="start-btn" onclick="startGame()">
Start Game
</button>

</div>

<script>

let playerCount = 4;

function setPlayers(num,btn){

playerCount = num;

document.querySelectorAll(".players button")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

document.getElementById("row3").style.display =
(num >= 3) ? "flex" : "none";

document.getElementById("row4").style.display =
(num == 4) ? "flex" : "none";
}

function startGame(){

const players=[];

players.push(
document.getElementById("p1").value || "Player 1"
);

players.push(
document.getElementById("p2").value || "Player 2"
);

if(playerCount >= 3){
players.push(
document.getElementById("p3").value || "Player 3"
);
}

if(playerCount == 4){
players.push(
document.getElementById("p4").value || "Player 4"
);
}

localStorage.setItem(
"dnPlayers",
JSON.stringify(players)
);

window.location.href="game.html";
}

</script>

</body>
</html>
