<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DN Ludo Board</title>
<style>
body{
margin:0;
padding:20px;
background:#f4f1ea;
font-family:Arial,sans-serif;
text-align:center;
}
.board{
width:min(95vw,500px);
height:min(95vw,500px);
margin:auto;
display:grid;
grid-template-columns:1fr 80px 1fr;
grid-template-rows:1fr 80px 1fr;
gap:4px;
}
.home{
display:flex;
align-items:center;
justify-content:center;
font-size:70px;
border-radius:12px;
}
.green{background:#2ecc71;}
.yellow{background:#f1c40f;}
.red{background:#e74c3c;}
.blue{background:#3498db;}
.path{
background:white;
border:1px solid #ccc;
}
.center{
display:flex;
align-items:center;
justify-content:center;
background:#07153d;
color:white;
font-size:30px;
font-weight:bold;
border-radius:12px;
}
</style>
</head>
<body>
<h1>🎲 DN Ludo</h1>
<div class="board">
<div class="home green">🟢</div>
<div class="path"></div>
<div class="home yellow">🟡</div>
<div class="path"></div>
<div class="center">DN</div>
<div class="path"></div>
<div class="home red">🔴</div>
<div class="path"></div>
<div class="home blue">🔵</div>
</div>
</body>
</html>
