<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DN Ludo Classic</title>

<style>
body{
margin:0;
background:#0a0a4f;
font-family:Arial,sans-serif;
text-align:center;
color:white;
}

h1{
color:gold;
margin:15px 0;
}

.board{
width:390px;
height:390px;



margin:auto;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(3,1fr);
border:4px solid white;
}

.red{background:#ff2222;}
.green{background:#00aa00;}
.yellow{background:#ffd700;}
.blue{background:#0066ff;}
.center{background:white;}

.home{
width:70%;
height:70%;
background:white;
margin:auto;
margin-top:15%;
border-radius:15px;
display:grid;
grid-template-columns:1fr 1fr;
grid-template-rows:1fr 1fr;
gap:10px;
padding:10px;
}

.token{
width:28px;
height:28px;
border-radius:50%;
margin:auto;
}

.r{background:red;}
.g{background:green;}
.y{background:gold;}
.b{background:blue;}

.center{
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
}

.controls{
margin-top:25px;
}

#dice{
font-size:55px;
margin-bottom:15px;
}

button{
padding:15px 40px;
font-size:20px;
font-weight:bold;
background:gold;
border:none;
border-radius:40px;
}
</style>
</head>

<body>

<h1>🎲 DN LUDO</h1>

<div class="board">

<div class="red">
<div class="home">
<div class="token r"></div>
<div class="token r"></div>
<div class="token r"></div>
<div class="token r"></div>
</div>
</div>

<div></div>

<div class="green">
<div class="home">
<div class="token g"></div>
<div class="token g"></div>
<div class="token g"></div>
<div class="token g"></div>
</div>
</div>

<div></div>

<div class="center">
<div style="
width:100%;
height:100%;
background:
linear-gradient(45deg,
red 25%,
green 25%,
green 50%,
yellow 50%,
yellow 75%,
blue 75%);
">
</div>
</div>

<div></div>

<div class="blue">
<div class="home">
<div class="token b"></div>
<div class="token b"></div>
<div class="token b"></div>
<div class="token b"></div>
</div>
</div>

<div></div>

<div class="yellow">
<div class="home">
<div class="token y"></div>
<div class="token y"></div>
<div class="token y"></div>
<div class="token y"></div>
</div>
</div>

</div>

<div class="controls">
<div id="dice">🎲</div>

<button onclick="rollDice()">
ROLL DICE
</button>

<h3 id="turn">Red Turn</h3>
</div>

<script>
let player=0;
let players=["Red","Green","Yellow","Blue"];

function rollDice(){
let num=Math.floor(Math.random()*6)+1;
document.getElementById("dice").innerHTML=num;

player=(player+1)%4;
document.getElementById("turn").innerHTML=
players[player]+" Turn";
}
</script>

</body>
</html>
